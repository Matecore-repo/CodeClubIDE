name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install Node Dependencies
        run: npm install

      - name: Fix Vite Worker Issue
        run: find node_modules/@open-pencil/core/dist -name "*.js" -exec sed -i '/sourceMappingURL/d' {} + || true

      - name: Build Application
        run: npm run build

      - name: Build and Package Linux
        run: npx electron-builder --config electron-builder.config.ts --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
